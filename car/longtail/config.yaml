# Long-tail Scene Classifier Configuration

threshold: 0.5

detectors:
  - type: clip
    weight: 0.5
    config:
      model_name: "/media/pi/FSDBY/weights/clip-vit-base-patch32"
      max_prob_threshold: 0.22
      entropy_threshold: 0.72
      labels:
        - "road construction with traffic cones"
        - "traffic cones on road"
        - "orange safety cones blocking the way"
        - "construction zone with cones"
        - "normal road driving scene"
        - "ordinary street scene"
        - "highway driving scene"
        - "pedestrian"
        - "car"
        - "truck"
        - "bus"
        - "motorcycle"
        - "bicycle"
        - "traffic cone"
        - "traffic bollard"
        - "road barrier"
        - "barricade"
        - "construction sign"
        - "detour sign"
        - "lane closed sign"
        - "temporary traffic sign"
        - "warning sign"
        - "arrow board"
        - "road work"
        - "traffic light"
        - "stop sign"

