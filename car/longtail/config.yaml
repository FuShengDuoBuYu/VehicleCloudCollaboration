  - type: yolov8
    weight: 0.1
    config:
      model_path: "/media/pi/FSDBY/weights/yolov8n.pt"
      conf_threshold: 0.25
      unusual_indicators:
        - "stop sign"
        - "parking meter"
        - "fire hydrant"

  - type: yolopv2
    weight: 0.1
    config:
      weights_path: "/media/pi/FSDBY/weights/yolopv2.pt"
      img_size: 640
      conf_threshold: 0.3
      use_full_model: false
